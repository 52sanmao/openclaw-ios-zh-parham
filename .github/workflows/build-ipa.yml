name: Build IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project OpenClaw.xcodeproj -scheme OpenClaw
      - name: Build unsigned app
        run: |
          xcodebuild -project OpenClaw.xcodeproj -scheme OpenClaw -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build
      - name: Package IPA
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -path '*Release-iphoneos/OpenClaw.app' | head -n 1)"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry OpenClaw-Pro-中文版.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Pro-IPA
          path: OpenClaw-Pro-中文版.ipa
